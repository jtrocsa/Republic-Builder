<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
<title>DBQ Mastery Badge</title><desc>A document shield with seven evidence marks representing the seven-point DBQ rubric.</desc>
<defs>
  <linearGradient id="gNavy" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#203B70"/><stop offset="1" stop-color="#0E1E3C"/></linearGradient>
  <linearGradient id="gGold" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#F2CF6B"/><stop offset="1" stop-color="#C88A26"/></linearGradient>
  <linearGradient id="gParchment" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FFF9E8"/><stop offset="1" stop-color="#EBD5A3"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#0E1E3C" flood-opacity=".25"/></filter>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="1.6" flood-color="#0E1E3C" flood-opacity=".16"/></filter>
</defs>

