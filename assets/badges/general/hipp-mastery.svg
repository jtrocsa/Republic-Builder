<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
<title>HIPP Mastery Badge</title><desc>A magnifying glass over a primary-source document representing historical sourcing.</desc>
<defs>
