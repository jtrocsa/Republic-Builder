<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Courier profession icon" data-asset-type="profession-icon">
  <title>Courier profession icon</title>
  <defs>
    <linearGradient id="gold-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF0A9"/>
      <stop offset="0.42" stop-color="#E9B74B"/>
      <stop offset="1" stop-color="#8A5313"/>
    </linearGradient>
    <linearGradient id="cloth-cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF7DA"/>
      <stop offset="1" stop-color="#BFA56E"/>
    </linearGradient>
    <linearGradient id="cloth-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2F708D"/>
      <stop offset="1" stop-color="#0B2B44"/>
    </linearGradient>
    <linearGradient id="leather-gradient" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#B87935"/>
      <stop offset="0.5" stop-color="#623616"/>
      <stop offset="1" stop-color="#2A160A"/>
    </linearGradient>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
    <filter id="gold-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
  </defs>
  
    <circle cx="64" cy="64" r="59" fill="#071A2D" stroke="url(#gold-gradient)" stroke-width="4"/>
