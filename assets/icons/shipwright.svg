  <title>Shipwright profession icon</title>
  <defs>
    <linearGradient id="gold-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF0A9"/>
      <stop offset="0.42" stop-color="#E9B74B"/>
      <stop offset="1" stop-color="#8A5313"/>
    </linearGradient>
    <linearGradient id="cloth-cream" x1="0" y1="0" x2="0" y2="1">
